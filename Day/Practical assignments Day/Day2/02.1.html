<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>

<body>

<h2>Student Registration Form</h2>

<form>

<label>Full Name:</label><br>
<input type="text"><br><br>

<label>Email:</label><br>
<input type="email"><br><br>

<label>Password:</label><br>
<input type="password"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>

<label>Languages Known:</label><br>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript<br><br>

<label>Department:</label><br>
<input type="radio" name="Department"> CSE
<input type="radio" name="Department"> CSE AI&ML
<input type="radio" name="Department"> ECE
<input type="radio" name="Department"> EEE

<br><br>

<label>Address:</label><br>
<textarea rows="4" cols="30"></textarea>

<br><br>

<label>Upload Resume:</label><br>
<input type="file">

<br><br>

<label>Date of Birth:</label><br>
<input type="date">

<br><br>

<input type="submit" value="Register">
<input type="reset" value="Reset">

</form>

</body>
</html>.
