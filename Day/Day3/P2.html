<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag: span row/col </title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">
                student details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Lishmitha</td>
            <td>Asha</td>
         </tr>
        <tr>
            <td>Roll No</td>
            <td>2159</td>
            <td>2160</td>
        </tr> 
    </table>
    <p> Rowspan </p>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th> Morning </th>
            <th> Evening </th>
        </tr>
        <tr>
            <td>Frontend learning </td>
            <td>Frontend practice </td>
        </tr>
        </table>   
    
</body>
</html>
