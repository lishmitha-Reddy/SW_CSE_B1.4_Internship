<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p> HTML Tables </p>
    <p> tr: table row 
        th: table header
        td: table data
    </p>
    <table border="1">
        <tr>
            <th>Month </th>
            <th>Income </th>
            <th>Expenses </th>
        </tr>
        <tr>
            <td>January</td>
            <td>50000</td>
            <td>30000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>60000</td>
            <td>35000</td>
        </tr>
    </table>
    
</body>
</html>
