<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p> HTML Tables </p>
    <p> tr: table row 
        th: table header
        td: table data
    </p>
    <table border="1">
        <caption>Monthly Financial Summary</caption>
        <tr>
            <th>Month </th>
            <th>Income </th>
            <th>Expenses </th>
        </tr>
        <tr>
            <td>January</td>
            <td>50000</td>
            <td>30000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>60000</td>
            <td>35000</td>
        </tr>
    </table>
    <table border="1"> 
        <caption> Sales Data </caption>
        <thread>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity Sold</th>
        </tr>
         </thread>
         <tbody>
        <tr>
            <td>Laptop</td>
            <td>1000</td>
            <td>50</td>
        </tr>
        <tr>
            <td>Mouse</td>
            <td>25</td>
            <td>200</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan="2">Total</td>
            <td>250</td>
        </tr>
        </tfoot>
    </table>
    
</body>
</html>
