<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML audio Tag</title>
</head>
<body>
    <audio src="sample-5s-360p.mp4" controls>
        Your browser does not support the audio tag.
    </audio>
     <!-- Audio formats
      1.Mp3
      2.OGG
      3.WAV
      -->
    <!-- Auto play -->
    <audio src="sample-5s-360p.mp4" autoplay controls>
        Your browser does not support the audio tag.    
    </audio>
    <!-- Muted -->
    <audio src="sample-5s-360p.mp4" muted controls>
        Your browser does not support the audio tag.
    </audio>
    <!-- Loop -->
    <audio src="sample-5s-360p.mp4" loop controls>
        Your browser does not support the audio tag.
    </audio>
    <!-- Preload -->

    <!-- none: Dont preload ;load only when needed-->
     <!-- meta data : Load only information like duration,dimensions etc -->
      <!--auto: Automatic; Browser load video immediately -->

     <audio src="sample-5s-360p.mp4" preload="none" controls>
        Your browser does not support the audio tag.        
     </audio>
</body>
</html>
