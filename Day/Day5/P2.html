    <meta charset="UTF-8">

    <title>Pesudo class selector</title>
    <style>
        a:hover{
            color: brown;
            background-color: lightblue;
            Text-decoration: underlin;
        }
        input[type="text"]{
           outline :2px solid rgb(161, 210, 16);
            padding: 5px;
        }
    </style>
</head>
<body>
    <p> Pseudo class Selector : Selects elements based on their state or position</p>

    <input type="text" name="username" placeholder="Enter your username"><br>
