<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units All in one example </title>
    <style>
        html{
            font-size: 16px;                
        }
        body{
            font-size: 1rem;
            margin: 0;
            padding:0;
        }
        .container{
            max-width: 1200px; /* fixed max width */
            width: 90%; /* flexa max width */
            margin: 0 auto;
            padding: 2rem 1rem; /* vertical & horizontal padding*/
        }
        h1{
            font-size: 2.5rem;
            margin-bottom: 0.5em; /*relative tp parent tag*/
        }
        p{
            font-size: 1rem;
            line-height:1.6;
            background-color: lightgreen
        }
        .hero{
            height:80vh; /* 80% of viewport height*/
            font-size: 0.5em; /*relative tp parent tag*/
        
        }
    </style>
</head>
<body>
    <div class="Hero">
        <h1> Lishmitha Reddy </h1> 

    </div>
    <div class="container">
     <h1> CSS units </h1>
     <p> Example for CSS units usage </p>
    </div>
</body>
</html>
