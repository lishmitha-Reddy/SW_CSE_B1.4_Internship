<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector </title>
    <style>
        a[href^="https"]{
            color: brown;
            background-color: lightblue;
        }
        input[type="text"]{
            border: 2px solid rgb(43, 149, 149);
            padding: 5px;
        }
    </style>
</head>
<body>
    <p> Attribute Selector : Selects elements with a specific attribute and value</p>
    <h1>Heading 1</h1>
    <a href="https://www.google.com">Google</a><br>
    <input type="text" name="username" placeholder="Enter your username"><br>
</body>
</html>
