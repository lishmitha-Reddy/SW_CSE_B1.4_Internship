<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors </title>
    <style>
        p{
            color: hsl(0, 100%, 50%);
        }
        h1{
            /* Transparent color -1% */
            color: hsl(240, 46%, 37%);
        }
    </style>
</head>
<body>
    <p> Paragraph with HSL color</p>
     <h1>Heading 1</h1>
</body>
</html>
