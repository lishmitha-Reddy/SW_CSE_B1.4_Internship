<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selectors </title>
    <style>
        p{
            color: rgb(118, 10, 10);
        }
        h1{
            /*HEX Colors: 00 toFF (0 to 255)*/
            color: rgb(10, 10, 118);
        }

</head>

    <p> Named color</p>
     <h1>Heading 1</h1>

</body>
</html>
