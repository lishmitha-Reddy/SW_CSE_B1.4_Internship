 2. reusability: One CSS file can be used for multiple HTML pages

<!-- How to use CSS? -->
 <!-- 1. Inline CSS 
  2. Internal CSS 
  3. External CSS 
  -->
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS </title>
    <style >
      h1{
        color:blue;
        text-align:center;
      }
      p{
        color:rgb(5, 5, 5);
        font-size: 20px;
      }
    </style>
  </head>
  <body>
      <h1> Inline CSS </h1>
      <p> This paragraph is styled using inline CSS. </p>

  </body>
  </html>
