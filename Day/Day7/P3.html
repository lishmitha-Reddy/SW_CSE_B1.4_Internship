<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: justify-content & align-items</title>
    <style>
        .container{
            display: flex;
            border: 2px solid black;
            padding: 10px;
            gap: 10px;

           justify-content: center;/* flex-start | flex-end| center|space-between|space-around|space-evenly*/
        } 
        .item{
            background-color: rgb(17, 145, 117);
            padding: 15px;
        }
         .item1{
            background-color: rgb(29, 101, 133);
            padding: 15px;
        }
         
         .container1{
            display: flex;
            border: 2px solid rgb(28, 5, 5);
            padding: 10px;
            gap: 10px;
            height: 200px;
            align-items: baseline; /*center| strech | flex-start | flex-end | baseline*/
           
        } 
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
    <div class="container1">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
</body>
</html>
